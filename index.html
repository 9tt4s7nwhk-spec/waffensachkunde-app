<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Waffensachkunde Trainer</title>

<style>
body{
background:#111;
color:white;
font-family:-apple-system,Arial;
margin:0;
padding:20px;
}
.container{
max-width:800px;
margin:auto;
}
.card{
background:#1f1f1f;
padding:20px;
border-radius:16px;
margin-top:20px;
}
button{
padding:14px 18px;
border:none;
border-radius:12px;
margin:5px;
font-size:16px;
background:#28c76f;
color:white;
}
.secondary{
background:#444;
}
textarea{
width:100%;
padding:12px;
border-radius:12px;
background:#333;
color:white;
border:none;
}
.result{
margin-top:20px;
font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>Waffensachkunde Trainer</h1>

<button onclick="setMode('learn')">Lernmodus</button>
<button onclick="setMode('exam')">Prüfungsmodus</button>
<button class="secondary" onclick="shuffleQuestions()">Zufallsfragen</button>

<div id="stats"></div>

<div class="card" id="app"></div>

</div>

<script>

let questions=[];
let current=0;
let mode='learn';
let score=0;

async function init(){

const res = await fetch('questions.json');
questions = await res.json();

render();

}

function setMode(m){

mode = m;

alert(
m==='learn'
? 'Lernmodus aktiviert'
: 'Prüfungsmodus aktiviert'
);

}

function shuffleQuestions(){

questions.sort(()=>Math.random()-0.5);
current=0;
score=0;

render();

}

function render(){

const q = questions[current];

document.getElementById('stats').innerHTML =
`Frage ${current+1} von ${questions.length} | Punkte: ${score} | Modus: ${mode}`;

document.getElementById('app').innerHTML = `

<h2>${q.id}</h2>

<p>${q.question}</p>

<textarea id="answer" rows="6" placeholder="Antwort eingeben..."></textarea>

<br><br>

<button onclick="submitAnswer()">Antwort abschicken</button>

<button class="secondary" onclick="nextQuestion()">Nächste Frage</button>

<div class="result" id="result"></div>

`;

}

function submitAnswer(){

const result = document.getElementById('result');

if(mode==='learn'){

result.innerHTML = `
✅ Antwort gespeichert<br><br>
Musterlösung:<br>
Antwort siehe offizieller Fragenkatalog.
`;

}else{

score++;

result.innerHTML = 'Antwort gespeichert';

}

}

function nextQuestion(){

current++;

if(current >= questions.length){

document.getElementById('app').innerHTML = `
<h2>Prüfung beendet</h2>
<p>Erreichte Punkte: ${score}</p>
<button onclick="restart()">Neu starten</button>
`;

return;

}

render();

}

function restart(){

current=0;
score=0;

shuffleQuestions();

}

init();

</script>

</body>
</html>
